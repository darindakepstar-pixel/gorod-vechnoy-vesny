<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Город вечной весны</title>
<style>
:root{
  --pink:#ff7ab8; --pink-dark:#c2417a; --lilac:#b98cff; --cream:#fff4f8;
  --ink:#2b1b2a; --neon:#3ff2d0; --gold:#ffd166;
  --box:rgba(28,14,28,.82); --line:rgba(255,255,255,.18);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:#12080f;
  font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;color:#fff}
button{font-family:inherit;cursor:pointer;border:none}

#stage{position:fixed;inset:0;display:flex;flex-direction:column}
#bg{position:absolute;inset:0;transition:background .5s ease;background:#222}
#bg::after{content:"";position:absolute;inset:0;
  background:radial-gradient(120% 80% at 50% 0%,transparent 40%,rgba(20,8,18,.55) 100%)}

/* ---- слой персонажей ---- */
#sprites{position:absolute;inset:0;display:flex;align-items:flex-end;
  justify-content:center;padding-bottom:34vh;pointer-events:none}
.sprite{width:min(46vw,260px);height:min(52vh,420px);border-radius:18px 18px 6px 6px;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:14px;border:2px solid rgba(255,255,255,.35);
  box-shadow:0 0 0 4px rgba(0,0,0,.15), 0 18px 40px rgba(0,0,0,.45);
  animation:pop .28s ease}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1}}
.sprite .nm{font-size:clamp(15px,4vw,22px);font-weight:700;letter-spacing:.5px;
  text-shadow:0 2px 6px rgba(0,0,0,.6)}
.sprite .emo{font-size:12px;opacity:.8;margin-top:4px}
.sprite .ph{font-size:11px;opacity:.5;margin-top:10px;text-align:center}
.sprite-img{max-width:min(60vw,340px);max-height:min(56vh,520px);width:auto;height:auto;
  object-fit:contain;filter:drop-shadow(0 14px 30px rgba(0,0,0,.5));animation:pop .28s ease}

/* ---- диалоговое окно ---- */
#dialog{position:absolute;left:0;right:0;bottom:0;padding:0 12px 12px;
  z-index:5}
#namebox{display:inline-block;margin-left:8px;padding:6px 18px;border-radius:14px 14px 0 0;
  font-weight:700;font-size:clamp(13px,3.6vw,17px);letter-spacing:.6px;
  background:var(--pink);color:#3a0a22;box-shadow:0 -2px 10px rgba(0,0,0,.3)}
#namebox.hidden{display:none}
#textbox{background:var(--box);backdrop-filter:blur(8px);
  border:1.5px solid var(--line);border-radius:16px;padding:16px 18px;
  min-height:30vh;max-height:44vh;overflow-y:auto;
  font-size:clamp(15px,4.1vw,19px);line-height:1.65}
#textbox.plain{border-top-left-radius:0}
#caret{display:inline-block;width:9px;height:9px;border-radius:50%;
  background:var(--neon);margin-left:6px;animation:blink .8s infinite}
@keyframes blink{50%{opacity:.15}}
#choices{display:flex;flex-direction:column;gap:9px;margin-top:14px}
.choice{background:linear-gradient(180deg,rgba(255,122,184,.24),rgba(185,140,255,.24));
  border:1.5px solid rgba(255,255,255,.4);border-radius:13px;
  padding:13px 16px;color:#fff;text-align:left;font-size:clamp(14px,3.9vw,17px);
  transition:transform .12s,background .12s}
.choice:active{transform:scale(.985)}
@media(hover:hover){.choice:hover{background:linear-gradient(180deg,rgba(255,122,184,.45),rgba(185,140,255,.45))}}

/* ---- верхняя панель ---- */
#topbar{position:absolute;top:0;left:0;right:0;z-index:6;display:flex;
  align-items:center;gap:8px;padding:calc(env(safe-area-inset-top) + 8px) 12px 8px}
#chapter{flex:1;font-size:12px;letter-spacing:1.4px;text-transform:uppercase;
  opacity:.85;text-shadow:0 2px 6px #000}
.tbtn{background:rgba(0,0,0,.4);border:1px solid var(--line);border-radius:10px;
  color:#fff;padding:7px 11px;font-size:12px}

/* ---- оверлеи ---- */
.overlay{position:fixed;inset:0;z-index:20;background:rgba(12,6,12,.92);
  display:none;flex-direction:column;padding:22px;overflow-y:auto}
.overlay.on{display:flex}
.overlay h2{margin:0 0 16px;font-size:20px;color:var(--pink)}
.row{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:10px}
.abtn{background:var(--pink);color:#3a0a22;border-radius:11px;padding:12px 18px;
  font-weight:700;font-size:15px}
.abtn.ghost{background:transparent;color:#fff;border:1.5px solid var(--line)}
input[type=text],input[type=range]{background:rgba(255,255,255,.1);border:1px solid var(--line);
  border-radius:10px;color:#fff;padding:11px 13px;font-size:15px;font-family:inherit;width:100%}
.logline{border-bottom:1px solid rgba(255,255,255,.1);padding:9px 0;font-size:14px;line-height:1.5}
.logline b{color:var(--pink)}

/* ---- титульный экран ---- */
#title{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;padding:26px;
  background:linear-gradient(160deg,#2a1030,#4a1840 45%,#6b2050)}
#title h1{font-size:clamp(30px,9vw,58px);margin:0;text-align:center;line-height:1.05;
  color:var(--cream);text-shadow:0 0 22px rgba(255,122,184,.65)}
#title p{margin:0;opacity:.75;font-size:14px;letter-spacing:2px;text-transform:uppercase}

/* ---- отладка ---- */
#debug{position:fixed;right:8px;bottom:calc(46vh + 10px);z-index:8;
  background:rgba(0,0,0,.72);border:1px solid var(--neon);border-radius:10px;
  padding:9px 11px;font-size:11px;line-height:1.7;display:none;min-width:120px}
#debug.on{display:block}
#debug b{color:var(--neon)}

@media(min-width:820px){
  #sprites{padding-bottom:30vh}
  .sprite{width:230px;height:400px}
  #dialog{padding:0 max(20px,8vw) 20px}
  #textbox{min-height:22vh;max-height:32vh}
  #choices{max-width:640px}
}
</style>
</head>
<body>

<div id="stage">
  <div id="bg"></div>
  <div id="sprites"></div>

  <div id="topbar">
    <div id="chapter"></div>
    <button class="tbtn" onclick="Game.openLog()">Лог</button>
    <button class="tbtn" onclick="Game.openMenu()">Меню</button>
  </div>

  <div id="debug"></div>

  <div id="dialog" onclick="Game.advance(event)">
    <div id="namebox" class="hidden"></div>
    <div id="textbox"><span id="text"></span><span id="caret"></span></div>
    <div id="choices"></div>
  </div>
</div>

<!-- титул -->
<div id="title">
  <p>визуальная новелла</p>
  <h1>Город<br>вечной весны</h1>
  <div style="width:min(340px,90vw);display:flex;flex-direction:column;gap:10px;margin-top:10px">
    <input type="text" id="nick" placeholder="Как тебя зовут?" maxlength="24">
    <button class="abtn" onclick="Game.start(false)">Новая игра</button>
    <button class="abtn ghost" onclick="Game.start(true)">Продолжить</button>
  </div>
  <p id="cloudstate" style="font-size:11px;letter-spacing:.5px;opacity:.5"></p>
</div>

<!-- меню -->
<div class="overlay" id="menu">
  <h2>Меню</h2>
  <div class="row">
    <button class="abtn" onclick="Game.save('slot1')">Сохранить</button>
    <button class="abtn ghost" onclick="Game.load('slot1')">Загрузить</button>
  </div>
  <p style="font-size:13px;opacity:.7;margin:4px 0 18px">Автосохранение работает после каждой сцены.</p>

  <h2>Скорость текста</h2>
  <input type="range" id="speed" min="0" max="60" value="22" oninput="Game.setSpeed(this.value)">
  <p style="font-size:13px;opacity:.7;margin:6px 0 18px">Левее — быстрее. В самом левом положении текст появляется сразу.</p>

  <div class="row" style="margin-top:auto">
    <button class="abtn ghost" onclick="Game.toggleDebug()">Отладка вкл/выкл</button>
    <button class="abtn ghost" onclick="Game.toTitle()">На титул</button>
    <button class="abtn" onclick="Game.closeAll()">Назад в игру</button>
  </div>
</div>

<!-- лог -->
<div class="overlay" id="log">
  <h2>Прочитанное</h2>
  <div id="logbody"></div>
  <div class="row" style="margin-top:18px">
    <button class="abtn" onclick="Game.closeAll()">Назад</button>
  </div>
</div>

<script src="config.js"></script>
<script src="scenes.js"></script>
<script src="engine.js"></script>
</body>
</html>
